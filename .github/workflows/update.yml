name: Update README via CH-Proxy

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tor & Configure CH Exit
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          # Erzwinge Schweizer Exit Nodes
          echo "ExitNodes {ch}" | sudo tee -a /etc/tor/torrc
          echo "StrictNodes 1" | sudo tee -a /etc/tor/torrc
          sudo service tor restart
          # Warten, bis Tor bereit ist
          sleep 15

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests PySocks

      - name: Run Script
        run: python update_readme.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add README.md
          git commit -m "README via Tor-CH Proxy aktualisiert" || exit 0
          git push
