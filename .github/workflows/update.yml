name: Update README Data

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Unterdrückt die Node-Warnung und nutzt die neuere Version
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Zwingend erforderlich für Schreibzugriff
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Skript ausführen
        run: python update_readme.py

      - name: Änderungen prüfen und speichern
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # Status prüfen (hilft bei der Fehlersuche im Log)
          git status
          
          git add README.md
          
          # Nur committen, wenn es wirklich Änderungen gibt
          if git diff --staged --quiet; then
            echo "Keine Änderungen an der README.md erkannt."
          else
            git commit -m "Automatisches README Update"
            git push origin main
          fi
